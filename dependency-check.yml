name: OWASP Dependency Check

on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "MyWebApp"
          path: "."
          format: "HTML"
          out: "dependency-check-report"
          # NVD now rate-limits anonymous requests heavily (scans can take
          # 30+ min or fail without a key). Request a free key at
          # https://nvd.nist.gov/developers/request-an-api-key and store it as
          # a repository secret named NVD_API_KEY.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Dependency-Check-Report
          path: dependency-check-report

