worker_processes auto;

events { 
    worker_connections 1024; 
}

http {
    server {
        listen 80;
        server_name whlab05.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name whlab05.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/whlab05.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/whlab05.duckdns.org/privkey.pem;

        location / {
            root /var/www/html;
            index index.html;
        }
    }
}